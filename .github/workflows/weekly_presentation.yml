name: Bugbee weekly presentation

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  weekly-presentation:
    runs-on: ubuntu-latest
    env:
      MAGAZORD_BASE_URL: ${{ secrets.MAGAZORD_BASE_URL }}
      MAGAZORD_API_KEY: ${{ secrets.MAGAZORD_API_KEY }}
      MAGAZORD_API_SECRET: ${{ secrets.MAGAZORD_API_SECRET }}
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly automation
        run: python -m src.main
