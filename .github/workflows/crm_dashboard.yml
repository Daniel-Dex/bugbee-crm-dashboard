name: Bugbee CRM dashboard

on:
  schedule:
    # Atualiza todos os dias às 08:20 em America/Bahia.
    - cron: "20 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    env:
      MAGAZORD_BASE_URL: ${{ secrets.MAGAZORD_BASE_URL }}
      MAGAZORD_API_KEY: ${{ secrets.MAGAZORD_API_KEY }}
      MAGAZORD_API_SECRET: ${{ secrets.MAGAZORD_API_SECRET }}
      TZ: America/Bahia
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build CRM dashboard
        run: python gerar_painel_crm.py --output ./docs/crm-metas

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
