name: Bugbee CRM dashboard

on:
  schedule:
    # Atualiza todos os dias às 08:20 em America/Bahia.
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    env:
      MAGAZORD_BASE_URL: ${{ secrets.MAGAZORD_BASE_URL }}
      MAGAZORD_API_KEY: ${{ secrets.MAGAZORD_API_KEY }}
      MAGAZORD_API_SECRET: ${{ secrets.MAGAZORD_API_SECRET }}
      TZ: America/Bahia
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build CRM dashboard
        shell: bash
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "Tentativa ${attempt}/6 de atualizar o painel CRM"
            if python gerar_painel_crm.py --output ./docs/crm-metas; then
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep $((attempt * 300))
            fi
          done
          exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
